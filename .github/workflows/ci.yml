name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Type-check ────────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd packages/database && npx prisma generate

      - name: Type-check API
        run: pnpm --filter @flowtiq/api type-check

      - name: Type-check Admin Portal
        run: pnpm --filter @flowtiq/admin-portal type-check

  # ─── E2E Tests ─────────────────────────────────────────────────────────────
  # Temporarily disabled — will be re-enabled once all test cases are fixed.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: API Smoke Tests + Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd packages/database && npx prisma generate

      - name: Run API smoke tests
        run: pnpm --filter @flowtiq/api test -- --ci --passWithNoTests
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-refresh-test-secret

      - name: Type-check API
        run: pnpm --filter @flowtiq/api type-check

      - name: Type-check Admin Portal
        run: pnpm --filter @flowtiq/admin-portal type-check

# mobile-release.yml
#
# Flowtiq Mobile Release Pipeline
# ================================
# Trigger: Push a tag matching mobile/<tenant-slug>/v<semver>
#   Example: git tag mobile/vastudeep/v1.0.0 && git push origin mobile/vastudeep/v1.0.0
#
# Manual trigger: GitHub Actions → Run workflow → enter tenant_slug
#
# Required GitHub repository secrets:
#   ANDROID_KEYSTORE_BASE64           - Base64-encoded keystore file content
#   ANDROID_KEYSTORE_PASSWORD         - Keystore store password
#   ANDROID_KEY_ALIAS                 - Key alias within the keystore
#   ANDROID_KEY_PASSWORD              - Key password
#   GOOGLE_SERVICES_JSON              - google-services.json file contents, base64 encoded
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON  - Google Play service account JSON (for Play Store upload)
#   GOOGLE_SERVICE_INFO_PLIST         - GoogleService-Info.plist contents, base64 encoded
#   APPLE_TEAM_ID                     - Apple Developer Team ID
#   APP_STORE_CONNECT_API_KEY_ID      - App Store Connect API Key ID
#   APP_STORE_CONNECT_API_ISSUER_ID   - App Store Connect API Issuer ID
#   APP_STORE_CONNECT_API_KEY_CONTENT - ASC API Key .p8 content, base64 encoded
#   MATCH_PASSWORD                    - fastlane match encryption password
#   MATCH_GIT_URL                     - URL of the private match certificates repository
#
# Adding a new tenant:
#   1. Create configs/build/tenant-configs/<slug>.json (copy vastudeep.json as template)
#   2. Add tenant-specific Firebase secrets: GOOGLE_SERVICES_JSON, GOOGLE_SERVICE_INFO_PLIST
#   3. Push tag mobile/<slug>/v1.0.0 to trigger the first build

name: Mobile Release

on:
  push:
    tags:
      - 'mobile/*/v*'
  workflow_dispatch:
    inputs:
      tenant_slug:
        description: 'Tenant slug (e.g. vastudeep)'
        required: true
        default: 'vastudeep'

jobs:
  # ── Setup: extract and validate tenant slug from tag or manual input ──────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      tenant_slug: ${{ steps.tenant.outputs.slug }}
    steps:
      - name: Extract tenant slug
        id: tenant
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLUG="${{ github.event.inputs.tenant_slug }}"
          else
            # Quote ref_name to prevent word splitting / glob expansion
            SLUG=$(echo "${{ github.ref_name }}" | cut -d'/' -f2)
          fi
          # Validate slug to prevent path traversal and shell injection
          if ! echo "$SLUG" | grep -qE '^[a-z0-9-]+$'; then
            echo "Error: invalid tenant slug: '$SLUG' — must match [a-z0-9-]+" >&2
            exit 1
          fi
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Echo tenant slug
        run: echo "Building for tenant -> ${{ steps.tenant.outputs.slug }}"

  # ── Android: build signed AAB and upload to Google Play internal track ────────
  android-build:
    name: Android Build + Play Store
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      # setup-node with cache: 'pnpm' handles pnpm store caching — no separate actions/cache needed
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Apply tenant config
        run: node scripts/apply-tenant-config.js "${{ needs.setup.outputs.tenant_slug }}"

      # Export TENANT_APPLICATION_ID from the .env written by apply-tenant-config
      - name: Export tenant application ID
        id: tenant-config
        run: |
          source apps/mobile/.env
          echo "application_id=$TENANT_APPLICATION_ID" >> $GITHUB_OUTPUT

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > apps/mobile/android/app/release.keystore

      - name: Place google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode \
            > apps/mobile/android/app/google-services.json

      - name: Build Android AAB
        working-directory: apps/mobile/android
        run: ./gradlew bundleRelease
        env:
          # KEYSTORE_FILE is relative to the module dir (android/app/) — no leading app/
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}

      - name: Upload AAB to Google Play internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ steps.tenant-config.outputs.application_id }}
          releaseFiles: apps/mobile/android/app/build/outputs/bundle/release/*.aab
          track: internal

  # ── iOS: build signed IPA via Fastlane and upload to TestFlight ──────────────
  ios-build:
    name: iOS Build + TestFlight
    runs-on: macos-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      # setup-node with cache: 'pnpm' handles pnpm store caching — no separate actions/cache needed
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Ruby and Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/mobile/ios

      # Cache on Podfile hash — Podfile.lock is gitignored so hashFiles('Podfile.lock') returns empty
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: apps/mobile/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('apps/mobile/ios/Podfile') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Apply tenant config
        run: node scripts/apply-tenant-config.js "${{ needs.setup.outputs.tenant_slug }}"

      - name: Place GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode \
            > apps/mobile/ios/GoogleService-Info.plist

      - name: Install CocoaPods
        run: cd apps/mobile/ios && pod install

      - name: Run Fastlane beta
        working-directory: apps/mobile/ios
        run: bundle exec fastlane beta
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          BUILD_NUMBER: ${{ github.run_number }}

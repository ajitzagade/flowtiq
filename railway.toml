[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @flowtiq/database exec prisma generate && pnpm --filter @flowtiq/api build"

[deploy]
startCommand = "node services/api/dist/index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

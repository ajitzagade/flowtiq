[build]
builder = "nixpacks"
buildCommand = "pnpm --filter @flowtiq/database exec prisma generate && pnpm --filter @flowtiq/api build"

[deploy]
startCommand = "pnpm --filter @flowtiq/database exec prisma db push --accept-data-loss && node services/api/dist/index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
